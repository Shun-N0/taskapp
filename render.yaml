databases:
  - name: taskapp-db
    plan: free
    databaseName: taskapp_production
    user: taskapp
    region: singapore

services:
  - type: web
    name: taskapp
    runtime: ruby
    plan: free
    region: singapore
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: "/up"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskapp-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_MAX_THREADS
        value: "3"
